version: "3.8"

services:
  backend:
    build: ../backend
    container_name: backend-api
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: devops
      DB_PASSWORD: devops
      DB_NAME: jobtracker
      JWT_SECRET: change_me_in_production_use_32chars_min
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: